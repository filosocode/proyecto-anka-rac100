<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home/forms"></ion-back-button>
    </ion-buttons>
    <ion-title>Borradores</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="fd-content">

  @if (drafts.length === 0) {
    <div class="empty-state fade-in-up">
      <ion-icon name="create-outline" class="empty-icon"></ion-icon>
      <h3>Sin borradores</h3>
      <p>Los formularios guardados como borrador aparecerán aquí.</p>
    </div>
  }

  <div class="fd-list">
    @for (draft of drafts; track draft.id) {
      <ion-item-sliding>

        <div class="fd-card fade-in-up" (click)="continuarBorrador(draft)">
          <div class="fd-card-left">
            <div class="fd-card-icon">
              <ion-icon name="create-outline"></ion-icon>
            </div>
          </div>
          <div class="fd-card-body">
            <h3 class="fd-card-title">{{ getNombreFormulario(draft) }}</h3>
            <p class="fd-card-date">Guardado: {{ formatFecha(draft.updatedAt) }}</p>
          </div>
          <div class="fd-card-action">
            <span class="fd-continue">Continuar →</span>
          </div>
        </div>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="eliminarBorrador(draft)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-item-option>
        </ion-item-options>

      </ion-item-sliding>
    }
  </div>

</ion-content>
