<ion-content class="login-content">

  <!-- Fondo superior con animación Lottie -->
  <div class="login-hero fade-in">
    <dotlottie-player
      src="assets/animations/drone.lottie"
      autoplay
      loop
      class="login-lottie">
    </dotlottie-player>
    <h1 class="login-logo fade-in-up delay-1">ANKA</h1>
    <p class="login-tagline fade-in-up delay-2">RAC 100 — Formularios Operativos</p>
  </div>

  <!-- Tarjeta del formulario -->
  <div class="login-card fade-in-up delay-2">

    <h2 class="login-card-title">Iniciar sesión</h2>

    <ion-item class="login-item" lines="none">
      <ion-label position="stacked">Correo electrónico</ion-label>
      <ion-input
        type="email"
        [(ngModel)]="email"
        placeholder="usuario@empresa.co"
        autocomplete="email">
      </ion-input>
    </ion-item>

    <ion-item class="login-item" lines="none">
      <ion-label position="stacked">Contraseña</ion-label>
      <ion-input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        autocomplete="current-password">
      </ion-input>
    </ion-item>

    @if (errorMessage) {
      <ion-text color="danger">
        <p class="login-error">{{ errorMessage }}</p>
      </ion-text>
    }

    <ion-button
      expand="block"
      class="login-btn"
      (click)="login()"
      [disabled]="loading">
      @if (loading) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Ingresar
      }
    </ion-button>

    <div class="login-footer-links">
      <ion-button fill="clear" size="small" routerLink="/recuperar-contrasena">
        ¿Olvidaste tu contraseña?
      </ion-button>
    </div>

    <ion-note class="login-demo">
      Demo: admin&#64;anka.co / 1234 &nbsp;·&nbsp; piloto&#64;anka.co / 1234
    </ion-note>

  </div>

</ion-content>
