<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="um-content">

  @if (users.length === 0) {
    <div class="empty-state fade-in-up">
      <ion-icon name="people-outline" class="empty-icon"></ion-icon>
      <h3>Sin usuarios registrados</h3>
      <p>Toca + para agregar el primero.</p>
    </div>
  }

  <div class="um-list">
    @for (user of users; track user.id) {
      <div class="um-card fade-in-up">
        <div class="um-avatar" [class]="'um-avatar--' + user.role">
          {{ getIniciales(user.name) }}
        </div>
        <div class="um-info">
          <h3 class="um-name">{{ user.name }}</h3>
          <p class="um-email">{{ user.email }}</p>
        </div>
        <span class="um-role" [class]="'um-role--' + user.role">
          {{ getTextoRol(user.role) }}
        </span>
        <div class="um-actions">
          <ion-button fill="clear" size="small" (click)="editarUsuario(user)">
            <ion-icon name="create-outline" slot="icon-only" color="primary"></ion-icon>
          </ion-button>
          <ion-button fill="clear" size="small" color="danger" (click)="eliminarUsuario(user)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>
    }
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="agregarUsuario()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
