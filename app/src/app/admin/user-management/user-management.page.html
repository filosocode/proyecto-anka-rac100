<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/drones"></ion-back-button>
    </ion-buttons>
    <ion-title>Gestión de Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  @if (users.length === 0) {
    <div class="ion-text-center ion-padding">
      <ion-icon name="person-outline" size="large" color="medium"></ion-icon>
      <p>No hay usuarios registrados.</p>
    </div>
  }

  <ion-list>
    @for (user of users; track user.id) {
      <ion-item>
        <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h3>{{ user.name }}</h3>
          <p>{{ user.email }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="getColorRol(user.role)">
          {{ getTextoRol(user.role) }}
        </ion-badge>
      </ion-item>
    }
  </ion-list>

</ion-content>
