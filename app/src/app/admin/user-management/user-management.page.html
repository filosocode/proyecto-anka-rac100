<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  @if (users.length === 0) {
    <div class="ion-text-center ion-padding">
      <ion-icon name="person-outline" size="large" color="medium"></ion-icon>
      <p>No hay usuarios registrados.</p>
    </div>
  }

  <ion-list>
    @for (user of users; track user.id) {
      <ion-item>
        <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h3>{{ user.name }}</h3>
          <p>{{ user.email }}</p>
        </ion-label>

        <ion-badge slot="end" [color]="getColorRol(user.role)">
          {{ getTextoRol(user.role) }}
        </ion-badge>

        <!-- Editar -->
        <ion-button fill="clear" slot="end" (click)="editarUsuario(user)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-button>

        <!-- Eliminar -->
        <ion-button fill="clear" color="danger" slot="end" (click)="eliminarUsuario(user)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>

  <!-- FAB: agregar usuario -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="agregarUsuario()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
