<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Drones</ion-title>
    <ion-buttons slot="end">
      <!-- Enlace rápido a usuarios -->
      <ion-button routerLink="/admin/users">Usuarios</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  @if (drones.length === 0) {
    <div class="ion-text-center ion-padding">
      <p>No hay drones registrados.</p>
    </div>
  }

  <ion-list>
    @for (drone of drones; track drone.id) {
      <ion-item>
        <ion-label>
          <h3>{{ drone.model }}</h3>
          <p>Serie: {{ drone.serial }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="getColorEstado(drone.status)">
          {{ getTextoEstado(drone.status) }}
        </ion-badge>
        <!-- Botón para eliminar -->
        <ion-button
          fill="clear"
          color="danger"
          slot="end"
          (click)="eliminarDrone(drone)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>

  <!-- Botón flotante para agregar un drone nuevo -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="agregarDrone()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
