<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Formularios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  @if (templates.length === 0) {
    <div class="ion-text-center ion-padding">
      <ion-icon name="document-text-outline" size="large" color="medium"></ion-icon>
      <p>No hay formularios registrados.</p>
    </div>
  }

  <ion-list>
    @for (tpl of templates; track tpl.id) {
      <ion-item>
        <ion-label>
          <h3>{{ tpl.title }}</h3>
          <p>{{ tpl.fields.length }} campo(s)</p>
        </ion-label>

        <ion-badge slot="end" [color]="tpl.active ? 'success' : 'medium'">
          {{ tpl.active ? 'Activo' : 'Inactivo' }}
        </ion-badge>

        <ion-toggle
          slot="end"
          [checked]="tpl.active"
          (ionChange)="toggleActivo(tpl)">
        </ion-toggle>

        <ion-button fill="clear" color="medium" slot="end" (click)="gestionarCampos(tpl.id)">
          <ion-icon name="list-outline" slot="icon-only"></ion-icon>
        </ion-button>

        <ion-button fill="clear" slot="end" (click)="editarFormulario(tpl)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-button>

        <ion-button fill="clear" color="danger" slot="end" (click)="eliminarFormulario(tpl)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="crearFormulario()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
