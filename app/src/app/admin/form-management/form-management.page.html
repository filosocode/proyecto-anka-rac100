<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Gestión de Formularios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="fmg-content">

  @if (templates.length === 0) {
    <div class="empty-state fade-in-up">
      <ion-icon name="document-text-outline" class="empty-icon"></ion-icon>
      <h3>Sin formularios</h3>
      <p>Toca + para crear el primero.</p>
    </div>
  }

  <div class="fmg-cards">
    @for (tpl of templates; track tpl.id) {
      <div class="fmg-card fade-in-up">
        <div class="fmg-card-top">
          <div class="fmg-card-info">
            <h3 class="fmg-title">{{ tpl.title }}</h3>
            <p class="fmg-meta">{{ tpl.fields.length }} campo(s)</p>
          </div>
          <div class="fmg-toggle-wrap">
            <ion-toggle
              [checked]="tpl.active"
              (ionChange)="toggleActivo(tpl)"
              color="secondary">
            </ion-toggle>
            <span class="fmg-status" [class]="tpl.active ? 'fmg-status--on' : 'fmg-status--off'">
              {{ tpl.active ? 'Activo' : 'Inactivo' }}
            </span>
          </div>
        </div>
        <div class="fmg-card-actions">
          <ion-button fill="outline" size="small" color="primary" (click)="gestionarCampos(tpl.id)">
            <ion-icon name="list-outline" slot="start"></ion-icon>
            Campos
          </ion-button>
          <ion-button fill="outline" size="small" (click)="editarFormulario(tpl)">
            <ion-icon name="create-outline" slot="start"></ion-icon>
            Editar
          </ion-button>
          <ion-button fill="clear" size="small" color="danger" (click)="eliminarFormulario(tpl)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </div>
      </div>
    }
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="crearFormulario()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
