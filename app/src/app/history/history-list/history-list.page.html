<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Historial de Operaciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (entries.length === 0) {
    <div class="ion-text-center ion-padding">
      <ion-icon name="time-outline" size="large" color="medium"></ion-icon>
      <p>Aún no has enviado formularios.</p>
    </div>
  }

  <ion-list>
    @for (entry of entries; track entry.id) {
      <ion-item>
        <ion-icon
          name="checkmark-circle-outline"
          slot="start"
          [color]="getColorEstado(entry.status)">
        </ion-icon>
        
        <ion-label>
          <h3>{{ getNombreFormulario(entry) }}</h3>
          <p>{{ formatFecha(entry.createdAt) }}</p>
        </ion-label>

        <ion-button 
          slot="end" 
          fill="clear" 
          [routerLink]="['/home/forms/fill', entry.templateId]" 
          [queryParams]="{ entryId: entry.id }">
          Ver Detalle
        </ion-button>

        <ion-badge slot="end" [color]="getColorEstado(entry.status)">
          {{ getNombreEstado(entry.status) }}
        </ion-badge>
      </ion-item>
    }
  </ion-list>
</ion-content>
