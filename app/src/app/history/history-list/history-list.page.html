<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Historial de Operaciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="hl-content">

  @if (entries.length === 0) {
    <div class="empty-state fade-in-up">
      <ion-icon name="time-outline" class="empty-icon"></ion-icon>
      <h3>Sin registros aún</h3>
      <p>Los formularios enviados aparecerán aquí.</p>
    </div>
  }

  <div class="hl-list">
    @for (entry of entries; track entry.id) {
      <div class="hl-card fade-in-up" [class]="'hl-card--' + entry.status">
        <div class="hl-card-bar"></div>
        <div class="hl-card-body">
          <div class="hl-card-top">
            <h3 class="hl-card-title">{{ getNombreFormulario(entry) }}</h3>
            <span class="hl-badge" [class]="'hl-badge--' + entry.status">
              {{ getNombreEstado(entry.status) }}
            </span>
          </div>
          <p class="hl-card-date">{{ formatFecha(entry.createdAt) }}</p>
        </div>
      </div>
    }
  </div>

</ion-content>
